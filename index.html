<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CV Reviewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>AI CV Reviewer</h1>
        <p class="subtitle">Paste your CV text and get AI-powered feedback with scoring</p>

        <div class="input-section">
            <label>Your CV Text</label>
            <textarea id="cvText" rows="12" placeholder="Paste your CV content here..."></textarea>
            <div class="input-row">
                <div class="input-group">
                    <label>Target Position (optional)</label>
                    <input type="text" id="targetRole" placeholder="e.g. Frontend Developer">
                </div>
                <button class="analyze-btn" id="analyzeBtn">Analyze CV</button>
            </div>
        </div>

        <div class="result-section" id="resultSection" style="display:none;">
            <div class="score-header">
                <div class="score-circle" id="scoreCircle">
                    <span class="score-number" id="scoreNumber">0</span>
                    <span class="score-out">/100</span>
                </div>
                <div class="score-label" id="scoreLabel"></div>
            </div>
            <div class="feedback" id="feedback"></div>
        </div>

        <div class="loading" id="loading" style="display:none;">
            <div class="spinner"></div>
            <span>Analyzing your CV...</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
